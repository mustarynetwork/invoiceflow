<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BizFlow — সেটিংস</title>
</head>
<body>
<div class="bf-layout">
  <nav class="bf-nav" id="bf-nav"></nav>
  <div class="bf-main">
    <div class="bf-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="bf-menu-btn" id="bf-menu-btn">☰</button>
        <span class="bf-page-title">সেটিংস</span>
      </div>
    </div>
    <div class="bf-body">

      <!-- SHEET CONFIG -->
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Google Sheet সংযোগ</div>
            <div class="card-sub">ডেটা সেভ ও লোড করতে Apps Script URL প্রয়োজন</div>
          </div>
          <span id="sheet-status" style="font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600"></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr;gap:14px;max-width:600px">
          <div class="field">
            <label>Google Apps Script Web App URL</label>
            <input type="url" id="s-sheet-url" placeholder="https://script.google.com/macros/s/…/exec"/>
          </div>
          <div>
            <button class="btn btn-primary" id="btn-save-sheet">সেভ ও পরীক্ষা করুন</button>
          </div>
        </div>
      </div>

      <!-- BUSINESS INFO -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">ব্যবসার তথ্য</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:600px">
          <div class="field">
            <label>ব্যবসার নাম</label>
            <input type="text" id="s-biz-name" placeholder="আপনার কোম্পানির নাম"/>
          </div>
          <div class="field">
            <label>ফোন</label>
            <input type="tel" id="s-biz-phone" placeholder="01XXXXXXXXX"/>
          </div>
          <div class="field" style="grid-column:1/-1">
            <label>ঠিকানা</label>
            <textarea id="s-biz-address" placeholder="ব্যবসার পূর্ণ ঠিকানা" style="min-height:60px"></textarea>
          </div>
          <div class="field" style="grid-column:1/-1">
            <button class="btn btn-primary" id="btn-save-biz">ব্যবসার তথ্য সেভ করুন</button>
          </div>
        </div>
      </div>

      <!-- PASSWORD SETTINGS (super only) -->
      <div class="card" id="pw-card">
        <div class="card-header">
          <div>
            <div class="card-title">পাসওয়ার্ড পরিবর্তন</div>
            <div class="card-sub">শুধুমাত্র Super User পরিবর্তন করতে পারবেন</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:500px">
          <div class="field">
            <label>Super User পাসওয়ার্ড</label>
            <input type="password" id="s-pw-super" placeholder="নতুন পাসওয়ার্ড"/>
          </div>
          <div class="field">
            <label>Admin পাসওয়ার্ড</label>
            <input type="password" id="s-pw-admin" placeholder="নতুন পাসওয়ার্ড"/>
          </div>
          <div class="field" style="grid-column:1/-1">
            <button class="btn btn-primary" id="btn-save-pw">পাসওয়ার্ড আপডেট করুন</button>
          </div>
        </div>
      </div>

      <!-- DANGER ZONE -->
      <div class="card" style="border:1.5px solid #fecaca">
        <div class="card-header">
          <div>
            <div class="card-title" style="color:var(--danger)">⚠️ ডেটা রিসেট</div>
            <div class="card-sub">সমস্ত স্থানীয় ডেটা মুছে ফেলবে — পূর্বাবস্থায় ফিরানো যাবে না</div>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" id="btn-reset">সমস্ত ডেটা রিসেট করুন</button>
      </div>

    </div>
  </div>
</div>

<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
buildNav('settings');

// Only super user can access settings
if (!Auth.isSuper()) {
  document.getElementById('pw-card').style.display = 'none';
}

// Load saved values
document.getElementById('s-sheet-url').value   = localStorage.getItem('bf_sheet_url')   || '';
document.getElementById('s-biz-name').value    = localStorage.getItem('bf_biz_name')    || '';
document.getElementById('s-biz-phone').value   = localStorage.getItem('bf_biz_phone')   || '';
document.getElementById('s-biz-address').value = localStorage.getItem('bf_biz_address') || '';

// Sheet status indicator
function setSheetStatus(connected) {
  const el = document.getElementById('sheet-status');
  if (connected) {
    el.textContent = '✓ সংযুক্ত';
    el.style.background = '#dcfce7'; el.style.color = '#15803d';
  } else {
    el.textContent = '✗ সংযুক্ত নয়';
    el.style.background = '#fee2e2'; el.style.color = '#dc2626';
  }
}
setSheetStatus(!!BF.sheetUrl);

// Save Sheet URL
document.getElementById('btn-save-sheet').addEventListener('click', async () => {
  const url = document.getElementById('s-sheet-url').value.trim();
  const btn = document.getElementById('btn-save-sheet');
  spinBtn(btn, true);
  localStorage.setItem('bf_sheet_url', url);
  BF.sheetUrl = url;
  // Test connection
  try {
    const res = await API.get('ping');
    setSheetStatus(true);
    toast('Sheet সংযুক্ত হয়েছে ✓', 'success');
  } catch(e) {
    setSheetStatus(false);
    toast('URL সেভ হয়েছে, কিন্তু সংযোগ পরীক্ষা ব্যর্থ', 'error');
  }
  spinBtn(btn, false);
});

// Save biz info
document.getElementById('btn-save-biz').addEventListener('click', () => {
  localStorage.setItem('bf_biz_name',    document.getElementById('s-biz-name').value.trim());
  localStorage.setItem('bf_biz_phone',   document.getElementById('s-biz-phone').value.trim());
  localStorage.setItem('bf_biz_address', document.getElementById('s-biz-address').value.trim());
  toast('ব্যবসার তথ্য সেভ হয়েছে ✓', 'success');
});

// Save passwords
document.getElementById('btn-save-pw').addEventListener('click', () => {
  const sup = document.getElementById('s-pw-super').value.trim();
  const adm = document.getElementById('s-pw-admin').value.trim();
  if (sup) { localStorage.setItem('bf_pw_super', sup); BF.roles.super = sup; }
  if (adm) { localStorage.setItem('bf_pw_admin', adm); BF.roles.admin = adm; }
  toast('পাসওয়ার্ড আপডেট হয়েছে ✓', 'success');
  document.getElementById('s-pw-super').value = '';
  document.getElementById('s-pw-admin').value = '';
});

// Reset all data
document.getElementById('btn-reset').addEventListener('click', () => {
  confirm('সমস্ত স্থানীয় ডেটা মুছে যাবে। নিশ্চিত?', () => {
    const keep = ['bf_sheet_url','bf_pw_super','bf_pw_admin','bf_biz_name','bf_biz_phone','bf_biz_address'];
    Object.keys(localStorage).forEach(k => { if (!keep.includes(k)) localStorage.removeItem(k); });
    toast('ডেটা রিসেট হয়েছে', 'success');
  }, 'ডেটা রিসেট');
});
</script>
</body>
</html>
